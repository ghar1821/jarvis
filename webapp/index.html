<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Jarvis</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <aside id="sidebar">
    <button id="new-chat-btn">+ New chat</button>
    <div id="session-list"></div>
  </aside>
  <main id="main">
    <header id="header">
      <span id="header-text">Jarvis</span>
      <button id="menu-btn" title="Menu" aria-label="Menu">⋮</button>
      <div id="header-menu" class="hidden">
        <button id="style-menu-item">Set response style…</button>
      </div>
    </header>
    <div id="messages"></div>
    <div id="input-bar">
      <input id="input" type="text" placeholder="Ask about your papers and notes..." autocomplete="off" autofocus>
      <label class="toggle-wrap" title="Off: answers from database only. On: uses model training knowledge if database has no results.">
        <input type="checkbox" id="ai-toggle" checked>
        <span class="toggle-track"></span>
        <span>DB only</span>
      </label>
      <button id="send-btn">Send</button>
    </div>
  </main>

  <!-- Response-style modal, hidden until opened from the ⋮ menu -->
  <div id="style-modal" class="modal hidden">
    <div class="modal-backdrop"></div>
    <div class="modal-box">
      <label for="style-textarea">Response style</label>
      <textarea id="style-textarea" placeholder="e.g. short and concise"></textarea>
      <div class="modal-actions">
        <button id="style-cancel">Cancel</button>
        <button id="style-save">Save</button>
      </div>
    </div>
  </div>

  <script src="/static/app.js" defer></script>
</body>
</html>
